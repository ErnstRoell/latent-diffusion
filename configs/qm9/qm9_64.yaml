dataset: 
  module: datasets.qm9
  root: data
  structured_directions: True
  raw: data/raw
  batch_size: 4
  resolution: 64
  use_diracs: False


scheduler: 
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02

model:
  module: ""
  im_channels: 3
  down_channels: [32,128,128]
  mid_channels: [128,128]
  down_sample: [True,True]
  attn_down: [False,True]
  attn_up: [False, False]
  time_emb_dim: 128
  norm_channels: 16
  num_heads: 16
  conv_out_channels: 128
  num_down_layers: 2
  num_mid_layers: 2
  num_up_layers: 2
trainer:
  num_epochs: 150
  lr: 0.0001
