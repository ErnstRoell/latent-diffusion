dataset: 
  module: datasets.mnist
  root: data
  raw: data/raw
  batch_size: 32


scheduler: 
  module: schedulers.linear
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  zero_snr: False


model:
  module: "models.unet"
  im_channels: 1
  time_emb_dim: 128
  bias: True
  down_blocks: 
    - in_channels: 32
      out_channels: 64
      t_emb_dim: 128
      down_sample: True
      num_heads: 8
      num_layers: 2
      attn: False
      norm_channels: 8
      bias: True
    - in_channels: 64
      out_channels: 128
      down_sample: False
      attn: True
      t_emb_dim: 128
      num_heads: 8
      num_layers: 2
      norm_channels: 8
      bias: True
  mid_blocks:
    - in_channels: 128
      out_channels: 128
      attn: True
      t_emb_dim: 128
      bias: True
      num_heads: 8
      num_layers: 2
      norm_channels: 8

trainer:
  module: null
  num_epochs: 10
  lr: 0.0001
  checkpoint_interval: 2
  validation_interval: 2
  flush_logs_every_n_steps: 2

meta:
  module: null
  modelname: unet
