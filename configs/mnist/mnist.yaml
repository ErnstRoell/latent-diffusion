dataset: 
  module: datasets.mnist
  root: data
  raw: data/raw
  batch_size: 32


scheduler: 
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  zero_snr: False

model:
  module: ""
  im_channels: 1
  down_channels: [32,64,128]
  mid_channels: [128,128]
  down_sample: [True,True]
  attn_down: [False,True]
  time_emb_dim: 128
  norm_channels: 8
  num_heads: 16
  conv_out_channels: 128
  num_down_layers: 2
  num_mid_layers: 2
  num_up_layers: 2

trainer:
  num_epochs: 150
  lr: 0.0005
  checkpoint_interval: 20
  validation_interval: 10
  flush_logs_every_n_steps: 1

meta:
  modelname: unet
